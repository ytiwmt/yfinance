name: US Stock Market Monitor

on:
  schedule:
    # JST 08:00 / 08:15 / 08:30（= UTC 23:00 / 23:15 / 23:30）
    - cron: '0 23 * * 1-5'
    - cron: '15 23 * * 1-5'
    - cron: '30 23 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests lxml

      - name: Run script
        env:
          WEBHOOK_URL_YFINANCE: ${{ secrets.WEBHOOK_URL_YFINANCE }}
        run: python check_yfinance.py
